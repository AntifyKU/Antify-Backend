
# Project identity
sonar.projectKey=AntifyKU_Antify-Backend
sonar.organization=antifyku
sonar.projectVersion=1.0.0

# Source & test directories
sonar.sources=app
sonar.tests=tests
sonar.language=py

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions, don't scan venv, migrations, or generated files
sonar.exclusions=venv/**,**/__pycache__/**,**/migrations/**

# Encoding
sonar.sourceEncoding=UTF-8